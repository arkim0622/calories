<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>칼로리 관리</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #667eea; min-height: 100vh; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 16px; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        .title { font-size: 28px; font-weight: 700; color: #667eea; }
        .date-nav { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .btn-nav { background: #f0f0f0; color: #667eea; }
        .btn-today { background: #667eea; color: white; }
        .current-date { font-weight: 600; color: #333; font-size: 14px; }
        .calendar-input { display: none; }
        .meals { margin-bottom: 20px; }
        .meal { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid #667eea; }
        .meal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .meal-name { font-weight: 600; }
        .meal-controls { display: flex; gap: 5px; }
        .meal-btn { background: #e0e0e0; border: none; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        input[type="number"] { padding: 8px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 13px; font-weight: 600; }
        input[type="text"] { padding: 8px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 13px; width: 100%; }
        .label { font-size: 10px; color: #667eea; font-weight: 700; margin-bottom: 2px; }
        .stats { background: #667eea; color: white; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .stat { background: rgba(255,255,255,0.2); padding: 8px; border-radius: 6px; }
        .stat-label { font-size: 11px; opacity: 0.9; }
        .stat-value { font-size: 20px; font-weight: 700; margin-top: 2px; }
        .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-save { background: #667eea; color: white; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        .btn-add { background: #e0e7ff; color: #667eea; border: 2px dashed #667eea; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">🎯 칼로리 관리</div>
        </div>

        <div class="date-nav">
            <button class="btn btn-nav" onclick="prevDay()">← 이전</button>
            <button class="btn btn-today" onclick="todayDay()">오늘</button>
            <div class="current-date" id="dateShow">2026-06-29</div>
            <input type="date" id="calendarInput" onchange="changeDate()">
            <button class="btn btn-nav" onclick="document.getElementById('calendarInput').click()">📅</button>
            <button class="btn btn-nav" onclick="nextDay()">다음 →</button>
        </div>

        <button class="btn-add" onclick="addItem()">+ 항목 추가</button>

        <div class="meals" id="meals"></div>

        <div class="stats">
            <div class="stat-row">
                <div class="stat">
                    <div class="stat-label">칼로리</div>
                    <div class="stat-value"><span id="cal">0</span> / 1800</div>
                </div>
                <div class="stat">
                    <div class="stat-label">단백질</div>
                    <div class="stat-value"><span id="protein">0</span> / 120</div>
                </div>
            </div>
            <div style="font-size: 16px; font-weight: 700;">달성도: <span id="achieve">0</span>%</div>
        </div>

        <div class="buttons">
            <button class="btn-save" onclick="save()">💾 저장</button>
            <button class="btn-save" style="background: #f0f0f0; color: #333;" onclick="clear()">🔄 초기화</button>
        </div>
    </div>

    <script>
        let currentDate = '2026-06-29';
        let meals = [];

        function loadMeals() {
            meals = JSON.parse(localStorage.getItem('meals_' + currentDate)) || [
                { id: 1, name: '☀️ 아침', fixed: true },
                { id: 2, name: '🌤️ 점심', fixed: true },
                { id: 3, name: '🌙 저녁', fixed: true }
            ];
            render();
        }

        // 6/29 초기 데이터
        function initData() {
            localStorage.setItem('meals_2026-06-29', JSON.stringify([
                { id: 1, name: '☀️ 아침', fixed: true },
                { id: 4, name: '🥤 간식1', fixed: false },
                { id: 2, name: '🌤️ 점심', fixed: true },
                { id: 5, name: '🍪 간식2', fixed: false },
                { id: 3, name: '🌙 저녁', fixed: true }
            ]));
            localStorage.setItem('meal_2026-06-29_1', JSON.stringify({ cal: 329, pro: 12 }));
            localStorage.setItem('meal_2026-06-29_2', JSON.stringify({ cal: 239, pro: 21 }));
            localStorage.setItem('meal_2026-06-29_3', JSON.stringify({ cal: 772, pro: 37.3 }));
            localStorage.setItem('meal_2026-06-29_4', JSON.stringify({ cal: 280, pro: 23.5 }));
            localStorage.setItem('meal_2026-06-29_5', JSON.stringify({ cal: 98, pro: 1.5 }));
        }

        function render() {
            document.getElementById('dateShow').textContent = currentDate;
            document.getElementById('calendarInput').value = currentDate;
            
            let html = '';
            meals.forEach((m, i) => {
                const data = JSON.parse(localStorage.getItem('meal_' + currentDate + '_' + m.id)) || { cal: 0, protein: 0 };
                const emoji = m.name.split(' ')[0];
                let nameText = m.name.substring(2);
                
                html += `
                    <div class="meal">
                        <div class="meal-header">
                            <input type="text" value="${nameText}" style="flex: 1; margin-right: 10px;" id="name_${m.id}" ${m.fixed ? 'disabled' : ''}>
                            <div class="meal-controls">
                                ${!m.fixed ? `<button class="meal-btn" onclick="delItem(${m.id})">✕</button>` : ''}
                            </div>
                        </div>
                        <div class="inputs">
                            <div>
                                <div class="label">칼로리</div>
                                <input type="number" id="cal_${m.id}" value="${data.cal || ''}" placeholder="0">
                            </div>
                            <div>
                                <div class="label">단백질(g)</div>
                                <input type="number" id="pro_${m.id}" value="${data.protein || ''}" placeholder="0" step="0.1">
                            </div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('meals').innerHTML = html;
            calc();
        }

        function calc() {
            let c = 0, p = 0;
            meals.forEach(m => {
                c += parseFloat(document.getElementById('cal_' + m.id).value) || 0;
                p += parseFloat(document.getElementById('pro_' + m.id).value) || 0;
            });
            document.getElementById('cal').textContent = Math.round(c);
            document.getElementById('protein').textContent = p.toFixed(1);
            const pct = Math.round((c/1800 + p/120) / 2 * 100);
            document.getElementById('achieve').textContent = pct;
        }

        function prevDay() {
            const d = new Date(currentDate);
            d.setDate(d.getDate() - 1);
            currentDate = d.toISOString().split('T')[0];
            loadMeals();
        }

        function nextDay() {
            const d = new Date(currentDate);
            d.setDate(d.getDate() + 1);
            currentDate = d.toISOString().split('T')[0];
            loadMeals();
        }

        function todayDay() {
            currentDate = new Date().toISOString().split('T')[0];
            loadMeals();
        }

        function changeDate() {
            currentDate = document.getElementById('calendarInput').value;
            loadMeals();
        }

        function addItem() {
            const emoji = ['🥤', '🍪', '🍰', '🧁', '🍩', '☕', '🥛', '🍫'][Math.floor(Math.random() * 8)];
            const id = Math.max(0, ...meals.map(m => m.id)) + 1;
            meals.push({ id, name: emoji + ' 간식', fixed: false });
            localStorage.setItem('meals_' + currentDate, JSON.stringify(meals));
            render();
        }

        function delItem(id) {
            meals = meals.filter(m => m.id !== id);
            localStorage.setItem('meals_' + currentDate, JSON.stringify(meals));
            render();
        }

        function save() {
            let c = 0, p = 0;
            meals.forEach(m => {
                const cal = parseFloat(document.getElementById('cal_' + m.id).value) || 0;
                const pro = parseFloat(document.getElementById('pro_' + m.id).value) || 0;
                const name = document.getElementById('name_' + m.id).value;
                localStorage.setItem('meal_' + currentDate + '_' + m.id, JSON.stringify({ cal, pro }));
                
                const emoji = m.name.split(' ')[0];
                m.name = emoji + ' ' + name;
            });
            localStorage.setItem('meals_' + currentDate, JSON.stringify(meals));
            alert('저장됨!');
        }

        function clear() {
            meals.forEach(m => {
                document.getElementById('cal_' + m.id).value = '';
                document.getElementById('pro_' + m.id).value = '';
            });
            calc();
        }

        initData();
        loadMeals();
    </script>
</body>
</html>
