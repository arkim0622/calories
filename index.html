<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💪🏼</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; background: #667eea; min-height: 100vh; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 16px; padding: 15px; }
        .header { text-align: center; margin-bottom: 10px; }
        .title { font-size: 32px; margin-bottom: 10px; }
        .tabs { display: flex; gap: 6px; margin-bottom: 15px; background: #f0f0f0; padding: 4px; border-radius: 8px; }
        .tab-btn { flex: 1; padding: 8px; border: none; background: transparent; color: #999; font-weight: 600; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .tab-btn.active { background: white; color: #667eea; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .date-nav { display: flex; gap: 8px; margin-bottom: 15px; align-items: center; justify-content: center; }
        .btn { padding: 8px 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; white-space: nowrap; }
        .btn-nav { background: #f0f0f0; color: #667eea; }
        .btn-today { background: #667eea; color: white; }
        .current-date { font-weight: 600; color: #333; font-size: 14px; letter-spacing: 0.5px; }
        input[type="date"] { padding: 8px 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn-add { background: #e0e7ff; color: #667eea; border: 2px dashed #667eea; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-bottom: 15px; width: 100%; font-size: 13px; }
        .meals { margin-bottom: 15px; }
        .meal { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid #667eea; }
        .meal-header { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
        .meal-name { flex: 1; }
        .meal-name input { width: 100%; padding: 6px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .meal-controls { display: flex; gap: 4px; }
        .meal-btn { background: #e0e0e0; border: none; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; }
        .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .input-group { display: flex; flex-direction: column; }
        .label { font-size: 10px; color: #667eea; font-weight: 700; margin-bottom: 2px; }
        input[type="number"], input[type="text"] { padding: 8px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 12px; font-weight: 600; width: 100%; }
        .notes { margin-top: 8px; border-top: 1px solid #e0e0e0; padding-top: 8px; }
        .note-item { background: white; padding: 6px; border-radius: 6px; margin-bottom: 6px; display: flex; gap: 4px; align-items: center; }
        .note-text { flex: 1; font-size: 12px; }
        .note-del { background: #e0e0e0; border: none; width: 40px; height: 24px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; }
        .note-input { display: flex; gap: 6px; }
        .note-input input { flex: 1; padding: 6px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 11px; }
        .note-input button { background: #667eea; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; }
        .stats { background: #667eea; color: white; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px; }
        .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat { background: rgba(255,255,255,0.2); padding: 8px; border-radius: 6px; }
        .stat-label { font-size: 10px; opacity: 0.9; }
        .stat-value { font-size: 18px; font-weight: 700; margin-top: 2px; }
        .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-save { background: #667eea; color: white; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; width: 100%; }
        .btn-reset { background: #f0f0f0; color: #333; }
        .table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        .table th { background: #667eea; color: white; padding: 8px; text-align: center; font-weight: 600; }
        .table td { padding: 8px; text-align: center; border-bottom: 1px solid #e0e0e0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">💪🏼</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('today')">📅 오늘</button>
            <button class="tab-btn" onclick="switchTab('weekly')">📊 주간</button>
            <button class="tab-btn" onclick="switchTab('monthly')">📈 월간</button>
        </div>

        <!-- 오늘 탭 -->
        <div id="today" class="tab-content active">
            <div class="date-nav">
                <button class="btn btn-nav" onclick="prevDay()">← 이전</button>
                <button class="btn btn-today" onclick="todayDay()">오늘</button>
                <input type="date" id="dateInput" onchange="changeDate()">
                <button class="btn btn-nav" onclick="nextDay()">다음 →</button>
            </div>

            <div class="stats">
                <div style="display: flex; gap: 10px; margin-bottom: 10px; align-items: center; justify-content: center;">
                    <label style="color: white; font-weight: 600; font-size: 13px; display: flex; gap: 6px; align-items: center;">
                        <input type="checkbox" id="exerciseCheck" onchange="updateExercise()" style="width: 18px; height: 18px; cursor: pointer;">
                        💪 운동함
                    </label>
                </div>
                <div class="stat-row">
                    <div class="stat">
                        <div class="stat-label">칼로리</div>
                        <div class="stat-value"><span id="totalCal">0</span> / 1800</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">단백질</div>
                        <div class="stat-value"><span id="totalPro">0</span> / 120</div>
                    </div>
                </div>
            </div>

            <button class="btn-add" onclick="addMeal()">+ 항목 추가</button>
            <div id="meals"></div>

            <div class="buttons">
                <button class="btn-save" onclick="saveMeals()">💾 저장</button>
                <button class="btn-save btn-reset" onclick="clearAll()">🔄 초기화</button>
            </div>
        </div>

        <!-- 주간 탭 -->
        <div id="weekly" class="tab-content">
            <table class="table">
                <thead>
                    <tr><th>날짜</th><th>칼로리</th><th>단백질</th></tr>
                </thead>
                <tbody id="weeklyTable"></tbody>
            </table>
        </div>

        <!-- 월간 탭 -->
        <div id="monthly" class="tab-content">
            <table class="table">
                <thead>
                    <tr><th>날짜</th><th>칼로리</th><th>단백질</th></tr>
                </thead>
                <tbody id="monthlyTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        let currentDate = new Date().toISOString().split('T')[0];
        let data = {};

        function initData() {
            // 6/29 초기값 (없을 때만 생성)
            if (!localStorage.getItem('cal_2026-06-29')) {
                localStorage.setItem('cal_2026-06-29', JSON.stringify({
                    exercise: false,
                    meals: [
                        { id: 1, name: '☀️ 아침', fixed: true, cal: 329, pro: 12, notes: [] },
                        { id: 4, name: '🥤 간식', fixed: false, cal: 280, pro: 23.5, notes: [] },
                        { id: 2, name: '🌤️ 점심', fixed: true, cal: 239, pro: 21, notes: [] },
                        { id: 5, name: '🍪 간식2', fixed: false, cal: 98, pro: 1.5, notes: [] },
                        { id: 3, name: '🌙 저녁', fixed: true, cal: 772, pro: 37.3, notes: [] }
                    ]
                }));
            }

            // 6/30 초기값 (없을 때만 생성)
            if (!localStorage.getItem('cal_2026-06-30')) {
                localStorage.setItem('cal_2026-06-30', JSON.stringify({
                    exercise: false,
                    meals: [
                        { id: 1, name: '☀️ 아침', fixed: true, cal: 295, pro: 17, notes: ['토마토 블루베리 스무디 (200ml)', '감동란 2개'] },
                        { id: 2, name: '🌤️ 점심', fixed: true, cal: '', pro: '', notes: [] },
                        { id: 3, name: '🌙 저녁', fixed: true, cal: '', pro: '', notes: [] }
                    ]
                }));
            }
        }

        function load() {
            initData();
            
            const stored = localStorage.getItem('cal_' + currentDate);
            if (stored) {
                data = JSON.parse(stored);
            } else {
                data = {
                    exercise: false,
                    meals: [
                        { id: 1, name: '☀️ 아침', fixed: true, cal: '', pro: '', notes: [] },
                        { id: 2, name: '🌤️ 점심', fixed: true, cal: '', pro: '', notes: [] },
                        { id: 3, name: '🌙 저녁', fixed: true, cal: '', pro: '', notes: [] }
                    ]
                };
            }
            updateDate();
            render();
        }

        function updateDate() {
            const d = new Date(currentDate);
            const days = ['일','월','화','수','목','금','토'];
            document.getElementById('dateInput').value = currentDate;
        }

        function render() {
            document.getElementById('exerciseCheck').checked = data.exercise || false;
            let html = '';
            data.meals.forEach((meal, idx) => {
                html += '<div class="meal">';
                html += '<div class="meal-header">';
                html += '<div class="meal-name"><input type="text" value="' + meal.name + '" id="name_' + meal.id + '" ' + (meal.fixed ? 'readonly' : '') + '></div>';
                html += '<div class="meal-controls">';
                if (!meal.fixed) {
                    html += '<button class="meal-btn" onclick="moveUp(' + idx + ')">↑</button>';
                    html += '<button class="meal-btn" onclick="moveDown(' + idx + ')">↓</button>';
                    html += '<button class="meal-btn" onclick="delMeal(' + meal.id + ')">✕</button>';
                }
                html += '</div></div>';
                
                html += '<div class="inputs">';
                html += '<div class="input-group"><label class="label">칼로리</label>';
                html += '<input type="number" id="cal_' + meal.id + '" value="' + (meal.cal || '') + '" placeholder="0" oninput="calc()">';
                html += '</div>';
                html += '<div class="input-group"><label class="label">단백질(g)</label>';
                html += '<input type="number" id="pro_' + meal.id + '" value="' + (meal.pro || '') + '" placeholder="0" step="0.1" oninput="calc()">';
                html += '</div>';
                html += '</div>';
                
                html += '<div class="notes">';
                meal.notes.forEach((note, nidx) => {
                    html += '<div class="note-item">';
                    html += '<div class="note-text">' + note + '</div>';
                    html += '<button class="note-del" onclick="editNote(' + meal.id + ',' + nidx + ')">수정</button>';
                    html += '<button class="note-del" onclick="delNote(' + meal.id + ',' + nidx + ')">✕</button>';
                    html += '</div>';
                });
                html += '<div class="note-input">';
                html += '<input type="text" id="noteInput_' + meal.id + '" placeholder="음식 상세" onkeypress="if(event.key==\'Enter\') addNote(' + meal.id + ')">';
                html += '<button onclick="addNote(' + meal.id + ')">추가</button>';
                html += '</div>';
                html += '</div>';
                
                html += '</div>';
            });
            document.getElementById('meals').innerHTML = html;
            calc();
        }

        function calc() {
            let c = 0, p = 0;
            data.meals.forEach(meal => {
                c += parseFloat(document.getElementById('cal_' + meal.id).value) || 0;
                p += parseFloat(document.getElementById('pro_' + meal.id).value) || 0;
            });
            document.getElementById('totalCal').textContent = Math.round(c);
            document.getElementById('totalPro').textContent = p.toFixed(1);
        }

        function addNote(mealId) {
            const input = document.getElementById('noteInput_' + mealId);
            const text = input.value.trim();
            if (text) {
                const meal = data.meals.find(m => m.id === mealId);
                if (meal) {
                    meal.notes.push(text);
                    input.value = '';
                    render();
                }
            }
        }

        function delNote(mealId, idx) {
            const meal = data.meals.find(m => m.id === mealId);
            if (meal) {
                meal.notes.splice(idx, 1);
                render();
            }
        }

        function editNote(mealId, idx) {
            const meal = data.meals.find(m => m.id === mealId);
            if (meal) {
                const newText = prompt('수정:', meal.notes[idx]);
                if (newText !== null && newText.trim()) {
                    meal.notes[idx] = newText.trim();
                    render();
                }
            }
        }

        function addMeal() {
            const emojis = ['🥤','🍪','🍰','🧁','🍩','☕','🥛','🍫'];
            const emoji = emojis[Math.floor(Math.random() * emojis.length)];
            const id = Math.max(0, ...data.meals.map(m => m.id)) + 1;
            data.meals.push({id: id, name: emoji + ' 간식', fixed: false, cal: '', pro: '', notes: []});
            render();
        }

        function delMeal(id) {
            data.meals = data.meals.filter(m => m.id !== id);
            render();
        }

        function moveUp(idx) {
            if (idx > 0 && !data.meals[idx].fixed) {
                [data.meals[idx], data.meals[idx-1]] = [data.meals[idx-1], data.meals[idx]];
                render();
            }
        }

        function moveDown(idx) {
            if (idx < data.meals.length - 1 && !data.meals[idx].fixed) {
                [data.meals[idx], data.meals[idx+1]] = [data.meals[idx+1], data.meals[idx]];
                render();
            }
        }

        function updateExercise() {
            data.exercise = document.getElementById('exerciseCheck').checked;
        }

        function saveMeals() {
            data.exercise = document.getElementById('exerciseCheck').checked;
            data.meals.forEach(meal => {
                meal.cal = parseFloat(document.getElementById('cal_' + meal.id).value) || 0;
                meal.pro = parseFloat(document.getElementById('pro_' + meal.id).value) || 0;
                const nameEl = document.getElementById('name_' + meal.id);
                if (nameEl && !meal.fixed) meal.name = nameEl.value;
            });
            localStorage.setItem('cal_' + currentDate, JSON.stringify(data));
            alert('저장됨! ✅');
            loadWeekly();
            loadMonthly();
        }

        function clearAll() {
            data.meals.forEach(meal => {
                document.getElementById('cal_' + meal.id).value = '';
                document.getElementById('pro_' + meal.id).value = '';
            });
            calc();
        }

        function prevDay() {
            const d = new Date(currentDate);
            d.setDate(d.getDate() - 1);
            currentDate = d.toISOString().split('T')[0];
            load();
        }

        function nextDay() {
            const d = new Date(currentDate);
            d.setDate(d.getDate() + 1);
            currentDate = d.toISOString().split('T')[0];
            load();
        }

        function todayDay() {
            currentDate = new Date().toISOString().split('T')[0];
            load();
        }

        function changeDate() {
            currentDate = document.getElementById('dateInput').value;
            load();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
            if (tab === 'weekly') loadWeekly();
            if (tab === 'monthly') loadMonthly();
        }

        function loadWeekly() {
            const d = new Date(currentDate);
            const dayOfWeek = d.getDay();
            const diff = d.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
            const monday = new Date(d.setDate(diff));
            
            let html = '';
            const days = ['월','화','수','목','금','토','일'];
            for (let i = 0; i < 7; i++) {
                const date = new Date(monday);
                date.setDate(date.getDate() + i);
                const dateStr = date.toISOString().split('T')[0];
                const stored = JSON.parse(localStorage.getItem('cal_' + dateStr) || '{"exercise":false,"meals":[]}');
                let c = 0, p = 0;
                if (stored.meals) {
                    stored.meals.forEach(m => { c += m.cal || 0; p += m.pro || 0; });
                }
                const exMark = stored.exercise ? '💪' : '';
                html += '<tr><td>' + days[i] + ' ' + exMark + '</td><td>' + Math.round(c) + '</td><td>' + p.toFixed(1) + '</td></tr>';
            }
            document.getElementById('weeklyTable').innerHTML = html;
        }

        function loadMonthly() {
            let html = '';
            for (let i = 1; i <= 31; i++) {
                const date = new Date(currentDate.slice(0,7) + '-' + String(i).padStart(2,'0'));
                if (date.getMonth() !== new Date(currentDate).getMonth()) break;
                const dateStr = date.toISOString().split('T')[0];
                const stored = JSON.parse(localStorage.getItem('cal_' + dateStr) || '{"exercise":false,"meals":[]}');
                let c = 0, p = 0;
                if (stored.meals) {
                    stored.meals.forEach(m => { c += m.cal || 0; p += m.pro || 0; });
                }
                if (c > 0 || p > 0) {
                    const exMark = stored.exercise ? '💪' : '';
                    html += '<tr><td>' + dateStr + ' ' + exMark + '</td><td>' + Math.round(c) + '</td><td>' + p.toFixed(1) + '</td></tr>';
                }
            }
            document.getElementById('monthlyTable').innerHTML = html || '<tr><td colspan="3">기록 없음</td></tr>';
        }

        load();
    </script>
</body>
</html>
