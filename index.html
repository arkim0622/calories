<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💪🏼 칼로리 관리</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #667eea; min-height: 100vh; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 16px; padding: 15px; }
        .header { text-align: center; margin-bottom: 15px; }
        .title { font-size: 26px; font-weight: 700; color: #667eea; }
        .date-nav { display: flex; gap: 8px; margin-bottom: 15px; align-items: center; justify-content: center; flex-wrap: nowrap; overflow-x: auto; padding: 0 5px; }
        .btn { padding: 8px 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; white-space: nowrap; }
        .btn-nav { background: #f0f0f0; color: #667eea; }
        .btn-today { background: #667eea; color: white; }
        .current-date { font-weight: 600; color: #333; font-size: 13px; }
        .calendar-input { display: none; }
        .btn-add { background: #e0e7ff; color: #667eea; border: 2px dashed #667eea; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-bottom: 15px; width: 100%; font-size: 13px; }
        .meals { margin-bottom: 15px; }
        .meal { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid #667eea; }
        .meal-header { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
        .meal-emoji { font-size: 16px; min-width: 20px; }
        .meal-name { flex: 1; }
        .meal-name input { width: 100%; padding: 6px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .meal-controls { display: flex; gap: 4px; }
        .meal-btn { background: #e0e0e0; border: none; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; }
        .meal-btn:active { background: #d0d0d0; }
        .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .input-group { display: flex; flex-direction: column; }
        .label { font-size: 10px; color: #667eea; font-weight: 700; margin-bottom: 2px; }
        input[type="number"] { padding: 8px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .stats { background: #667eea; color: white; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px; }
        .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .stat { background: rgba(255,255,255,0.2); padding: 8px; border-radius: 6px; }
        .stat-label { font-size: 10px; opacity: 0.9; }
        .stat-value { font-size: 18px; font-weight: 700; margin-top: 2px; }
        .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-save { background: #667eea; color: white; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn-reset { background: #f0f0f0; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">💪🏼 칼로리 관리</div>
        </div>

        <div class="date-nav">
            <button class="btn btn-nav" onclick="prevDay()">← 이전</button>
            <button class="btn btn-today" onclick="todayDay()">오늘</button>
            <div class="current-date" id="dateShow"></div>
            <input type="date" id="calendarInput" class="calendar-input">
            <button class="btn btn-nav" onclick="openCalendar()">📅</button>
            <button class="btn btn-nav" onclick="nextDay()">다음 →</button>
        </div>

        <button class="btn-add" onclick="addItem()">+ 항목 추가</button>

        <div class="meals" id="meals"></div>

        <div class="stats">
            <div class="stat-row">
                <div class="stat">
                    <div class="stat-label">칼로리</div>
                    <div class="stat-value"><span id="cal">0</span> / 1800</div>
                </div>
                <div class="stat">
                    <div class="stat-label">단백질</div>
                    <div class="stat-value"><span id="protein">0</span> / 120</div>
                </div>
            </div>
            <div style="font-size: 15px; font-weight: 700;">달성도: <span id="achieve">0</span>%</div>
        </div>

        <div class="buttons">
            <button class="btn-save" onclick="save()">💾 저장</button>
            <button class="btn-save btn-reset" onclick="clear()">🔄 초기화</button>
        </div>
    </div>

    <script>
        let currentDate = new Date().toISOString().split('T')[0];
        let meals = [];

        function loadMeals() {
            meals = JSON.parse(localStorage.getItem('meals_' + currentDate)) || [
                { id: 1, emoji: '☀️', name: '아침', fixed: true },
                { id: 2, emoji: '🌤️', name: '점심', fixed: true },
                { id: 3, emoji: '🌙', name: '저녁', fixed: true }
            ];
            updateDateDisplay();
            render();
        }

        function updateDateDisplay() {
            const d = new Date(currentDate);
            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            document.getElementById('dateShow').textContent = currentDate + ' (' + dayNames[d.getDay()] + ')';
            document.getElementById('calendarInput').value = currentDate;
        }

        function render() {
            let html = '';
            meals.forEach((m, idx) => {
                const data = JSON.parse(localStorage.getItem('meal_' + currentDate + '_' + m.id)) || { cal: 0, pro: 0 };
                
                html += `
                    <div class="meal">
                        <div class="meal-header">
                            <div class="meal-emoji">${m.emoji}</div>
                            <div class="meal-name">
                                <input type="text" value="${m.name}" id="name_${m.id}" ${m.fixed ? 'readonly' : ''}>
                            </div>
                            <div class="meal-controls">
                                ${!m.fixed ? `<button class="meal-btn" onclick="moveUp(${idx})">↑</button>` : ''}
                                ${!m.fixed ? `<button class="meal-btn" onclick="moveDown(${idx})">↓</button>` : ''}
                                ${!m.fixed ? `<button class="meal-btn" onclick="delItem(${m.id})">✕</button>` : ''}
                            </div>
                        </div>
                        <div class="inputs">
                            <div class="input-group">
                                <label class="label">칼로리</label>
                                <input type="number" id="cal_${m.id}" value="${data.cal || ''}" placeholder="0" oninput="calc()">
                            </div>
                            <div class="input-group">
                                <label class="label">단백질(g)</label>
                                <input type="number" id="pro_${m.id}" value="${data.pro || ''}" placeholder="0" step="0.1" oninput="calc()">
                            </div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('meals').innerHTML = html;
            calc();
        }

        function calc() {
            let c = 0, p = 0;
            meals.forEach(m => {
                const calEl = document.getElementById('cal_' + m.id);
                const proEl = document.getElementById('pro_' + m.id);
                if (calEl) c += parseFloat(calEl.value) || 0;
                if (proEl) p += parseFloat(proEl.value) || 0;
            });
            document.getElementById('cal').textContent = Math.round(c);
            document.getElementById('protein').textContent = p.toFixed(1);
            const pct = Math.round((c/1800 + p/120) / 2 * 100);
            document.getElementById('achieve').textContent = pct;
        }

        function prevDay() {
            const d = new Date(currentDate);
            d.setDate(d.getDate() - 1);
            currentDate = d.toISOString().split('T')[0];
            loadMeals();
        }

        function nextDay() {
            const d = new Date(currentDate);
            d.setDate(d.getDate() + 1);
            currentDate = d.toISOString().split('T')[0];
            loadMeals();
        }

        function todayDay() {
            currentDate = new Date().toISOString().split('T')[0];
            loadMeals();
        }

        function openCalendar() {
            document.getElementById('calendarInput').click();
        }

        document.getElementById('calendarInput').addEventListener('change', function() {
            currentDate = this.value;
            loadMeals();
        });

        function addItem() {
            const emojis = ['🥤', '🍪', '🍰', '🧁', '🍩', '☕', '🥛', '🍫'];
            const emoji = emojis[Math.floor(Math.random() * emojis.length)];
            const id = Math.max(0, ...meals.map(m => m.id)) + 1;
            meals.push({ id, emoji, name: '간식', fixed: false });
            localStorage.setItem('meals_' + currentDate, JSON.stringify(meals));
            render();
        }

        function delItem(id) {
            meals = meals.filter(m => m.id !== id);
            localStorage.setItem('meals_' + currentDate, JSON.stringify(meals));
            render();
        }

        function moveUp(idx) {
            if (idx > 0 && !meals[idx].fixed) {
                [meals[idx], meals[idx - 1]] = [meals[idx - 1], meals[idx]];
                localStorage.setItem('meals_' + currentDate, JSON.stringify(meals));
                render();
            }
        }

        function moveDown(idx) {
            if (idx < meals.length - 1 && !meals[idx].fixed) {
                [meals[idx], meals[idx + 1]] = [meals[idx + 1], meals[idx]];
                localStorage.setItem('meals_' + currentDate, JSON.stringify(meals));
                render();
            }
        }

        function save() {
            meals.forEach(m => {
                const calEl = document.getElementById('cal_' + m.id);
                const proEl = document.getElementById('pro_' + m.id);
                const nameEl = document.getElementById('name_' + m.id);
                
                if (calEl && proEl && nameEl) {
                    const cal = parseFloat(calEl.value) || 0;
                    const pro = parseFloat(proEl.value) || 0;
                    const name = nameEl.value;
                    
                    localStorage.setItem('meal_' + currentDate + '_' + m.id, JSON.stringify({ cal, pro }));
                    m.name = name;
                }
            });
            localStorage.setItem('meals_' + currentDate, JSON.stringify(meals));
            alert('저장됨! ✅');
        }

        function clear() {
            meals.forEach(m => {
                const calEl = document.getElementById('cal_' + m.id);
                const proEl = document.getElementById('pro_' + m.id);
                if (calEl) calEl.value = '';
                if (proEl) proEl.value = '';
            });
            calc();
        }

        loadMeals();
    </script>
</body>
</html>
