<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💪🏼</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; background: #667eea; min-height: 100vh; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 16px; padding: 15px; }
        .header { text-align: center; margin-bottom: 10px; }
        .title { font-size: 32px; margin-bottom: 10px; }
        .tabs { display: flex; gap: 6px; margin-bottom: 15px; background: #f0f0f0; padding: 4px; border-radius: 8px; }
        .tab-btn { flex: 1; padding: 8px; border: none; background: transparent; color: #999; font-weight: 600; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .tab-btn.active { background: white; color: #667eea; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .date-nav { display: flex; gap: 8px; margin-bottom: 15px; align-items: center; justify-content: center; }
        .btn { padding: 8px 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; white-space: nowrap; }
        .btn-nav { background: #f0f0f0; color: #667eea; }
        .btn-today { background: #667eea; color: white; }
        input[type="date"] { padding: 8px 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn-add { background: #e0e7ff; color: #667eea; border: 2px dashed #667eea; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; font-size: 13px; margin-top: 15px; }
        .meals { margin-bottom: 15px; }
        .meal { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid #667eea; }
        .meal-header { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
        .meal-name { flex: 1; }
        .meal-name input { width: 100%; padding: 6px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .meal-controls { display: flex; gap: 4px; }
        .meal-btn { background: #e0e0e0; border: none; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; }
        .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .input-group { display: flex; flex-direction: column; }
        .label { font-size: 10px; color: #667eea; font-weight: 700; margin-bottom: 2px; }
        input[type="number"], input[type="text"] { padding: 8px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 12px; font-weight: 600; width: 100%; }
        .notes { margin-top: 8px; margin-bottom: 12px; border-top: 1px solid #e0e0e0; padding-top: 8px; }
        .note-item { background: white; padding: 6px; border-radius: 6px; margin-bottom: 6px; display: flex; gap: 4px; align-items: center; }
        .note-text { flex: 1; font-size: 12px; }
        .note-del { background: #e0e0e0; border: none; width: 40px; height: 24px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; }
        .note-input { display: flex; gap: 6px; }
        .note-input input { flex: 1; padding: 6px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 11px; }
        .note-input button { background: #667eea; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; }
        .stats { background: #667eea; color: white; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px; }
        .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat { background: rgba(255,255,255,0.2); padding: 8px; border-radius: 6px; }
        .stat-label { font-size: 10px; opacity: 0.9; }
        .stat-value { font-size: 18px; font-weight: 700; margin-top: 2px; }
        .stat-diff { font-size: 13px; margin-top: 6px; font-weight: 700; background: #ffffff; padding: 4px 8px; border-radius: 4px; }
        .stat-green { color: #4ade80; }
        .stat-red { color: #ef4444; }
        .buttons { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        .btn-save { background: #667eea; color: white; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; width: 100%; }
        .table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        .table th { background: #667eea; color: white; padding: 8px; text-align: center; font-weight: 600; }
        .table td { padding: 8px; text-align: center; border-bottom: 1px solid #e0e0e0; }
        #loadingOverlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 12px; }
        .spinner { width: 36px; height: 36px; border: 4px solid #e0e7ff; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #syncStatus { font-size: 11px; color: #667eea; font-weight: 600; text-align: right; padding: 4px 8px; background: #e0e7ff; border-radius: 6px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div style="color: #667eea; font-weight: 600; font-size: 14px;">동기화 중...</div>
    </div>

    <div class="container">
        <div class="header"><div class="title">💪🏼</div></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('today',this)">📅 오늘</button>
            <button class="tab-btn" onclick="switchTab('weekly',this)">📊 주간</button>
            <button class="tab-btn" onclick="switchTab('monthly',this)">📈 월간</button>
        </div>

        <div id="today" class="tab-content active">
            <div class="date-nav">
                <button class="btn btn-nav" onclick="prevDay()">← 이전</button>
                <button class="btn btn-today" onclick="todayDay()">오늘</button>
                <input type="date" id="dateInput" onchange="changeDate()">
                <button class="btn btn-nav" onclick="nextDay()">다음 →</button>
            </div>
            <div class="stats">
                <div style="display: flex; gap: 10px; margin-bottom: 10px; align-items: center; justify-content: center;">
                    <label style="color: white; font-weight: 600; font-size: 13px; display: flex; gap: 6px; align-items: center;">
                        <input type="checkbox" id="exerciseCheck" onchange="updateExercise()" style="width: 18px; height: 18px; cursor: pointer;">
                        🏋🏻‍♀️ 운동함
                    </label>
                </div>
                <div class="stat-row">
                    <div class="stat" id="calStat">
                        <div class="stat-label">칼로리</div>
                        <div class="stat-value"><span id="totalCal">0</span> / 1800</div>
                        <div class="stat-diff" id="calDiff"></div>
                    </div>
                    <div class="stat" id="proStat">
                        <div class="stat-label">단백질</div>
                        <div class="stat-value"><span id="totalPro">0</span> / 120</div>
                        <div class="stat-diff" id="proDiff"></div>
                    </div>
                </div>
            </div>
            <div id="meals"></div>
            <datalist id="foodPresetsList"></datalist>
            <button class="btn-add" onclick="addMeal()">+ 항목 추가</button>
            <div id="quickAddFoods" style="display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;justify-content:center;"></div>
            <div class="buttons">
                <button class="btn-save" onclick="saveMeals()">💾 저장</button>
            </div>

            <div id="backupToast" style="display:none; max-width:280px; margin:18px auto 0; background:#fff3cd; border:1px solid #ffe69c; color:#664d03; border-radius:10px; padding:10px 30px 10px 12px; font-size:12px; font-weight:600; position:relative; box-shadow:0 2px 8px rgba(0,0,0,0.12);">
                📥 한 달에 한 번 백업을 추천해요!
                <button onclick="closeBackupToast()" style="position:absolute; top:6px; right:8px; background:none; border:none; font-size:14px; line-height:1; cursor:pointer; color:#664d03; padding:0;">✕</button>
                <div style="position:absolute; bottom:-7px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:7px solid transparent; border-right:7px solid transparent; border-top:7px solid #fff3cd;"></div>
            </div>
            <div style="text-align: center; margin-top: 8px;">
                <button onclick="exportData()" class="btn" style="background: #f0f0f0; color: #667eea; font-size: 11px; padding: 6px 12px;">💾 백업 내보내기</button>
            </div>
        </div>

        <div id="weekly" class="tab-content">
            <div id="weekTitle" style="display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px;"></div>
            <table class="table">
                <thead><tr><th>날짜</th><th>칼로리</th><th>단백질</th></tr></thead>
                <tbody id="weeklyTable"></tbody>
            </table>
            <canvas id="weeklyChart" style="margin-top: 20px; max-height: 300px;"></canvas>
        </div>

        <div id="monthly" class="tab-content">
            <div style="display: flex; gap: 10px; margin-bottom: 15px; justify-content: center;">
                <button id="calendarViewBtn" class="btn" onclick="switchMonthlyView('calendar')" style="background: #667eea; color: white;">📅 캘린더</button>
                <button id="graphViewBtn" class="btn" onclick="switchMonthlyView('graph')" style="background: #f0f0f0; color: #667eea;">📊 그래프</button>
            </div>
            <div id="calendarView"><div id="monthlyCalendar"></div></div>
            <div id="graphView" style="display: none;">
                <div style="display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center;">
                    <button class="btn" onclick="loadMonthlyGraph('1w')" style="background: #f0f0f0; color: #667eea; font-size: 12px;">1주일</button>
                    <button class="btn" onclick="loadMonthlyGraph('1m')" style="background: #667eea; color: white; font-size: 12px;">1개월</button>
                    <button class="btn" onclick="loadMonthlyGraph('2m')" style="background: #f0f0f0; color: #667eea; font-size: 12px;">2개월</button>
                    <button class="btn" onclick="loadMonthlyGraph('3m')" style="background: #f0f0f0; color: #667eea; font-size: 12px;">3개월</button>
                    <button class="btn" onclick="loadMonthlyGraph('6m')" style="background: #f0f0f0; color: #667eea; font-size: 12px;">6개월</button>
                    <button class="btn" onclick="loadMonthlyGraph('12m')" style="background: #f0f0f0; color: #667eea; font-size: 12px;">12개월</button>
                </div>
                <canvas id="monthlyGraphChart" style="max-height: 300px;"></canvas>
            </div>
        </div>

        <div id="syncStatus" style="text-align: center; margin-top: 20px;">☁️ Firebase 연결됨</div>
    </div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
import { initializeFirestore, doc, getDoc, setDoc, collection, getDocs, writeBatch } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';

const firebaseConfig = {
    apiKey: "AIzaSyBE60QXHNa9Q8xzdgRxslsksSk9spZtiCw",
    authDomain: "calories-tracker-fb95f.firebaseapp.com",
    projectId: "calories-tracker-fb95f",
    storageBucket: "calories-tracker-fb95f.firebasestorage.app",
    messagingSenderId: "412312685562",
    appId: "1:412312685562:web:cc791002ead30419d37243"
};

const app = initializeApp(firebaseConfig);
// 일부 네트워크 환경에서 WebChannel 연결이 막혀 무한 대기하는 문제 방지
const db = initializeFirestore(app, { experimentalAutoDetectLongPolling: true });

// 로컬(기기) 시간대 기준 날짜 문자열 (YYYY-MM-DD)
function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function shiftDate(dateStr, delta) {
    const [y, m, dd] = dateStr.split('-').map(Number);
    const d = new Date(y, m - 1, dd);
    d.setDate(d.getDate() + delta);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

let currentDate = todayStr();
let data = {};
let calYear, calMonth; // 월간 캘린더가 현재 보고 있는 연/월
let weekRefDate; // 주간 탭이 현재 보고 있는 주의 기준 날짜

// ── 자주 먹는 메뉴 프리셋 (이름: {cal, pro, emoji}) ──────────────
// 여기 있는 값은 실제 입력 이력이 아직 없을 때 쓰는 "기본 추정값"일 뿐.
// refreshFoodHistory()가 Firestore 기록에서 같은 이름으로 실제 입력했던 값을 찾으면 자동으로 그 평균값으로 덮어씀.
// 필요하면 언제든 얘기해서 이름 추가/수정 가능
const FOOD_PRESET_DEFAULTS = {
    '그릭요거트볼': { cal: 360, pro: 15,  emoji: '🥣' }, // 그릭요거트+바나나+블루베리+피넛버터+그래놀라 기준 추정
    '삶은계란1':   { cal: 70,  pro: 6,   emoji: '🥚' }, // 계란 1개
    '삶은계란2':   { cal: 140, pro: 12,  emoji: '🥚' }, // 계란 2개
    '단백질쉐이크': { cal: 99,  pro: 20, emoji: '🥤' },
    '단백질바':   { cal: 100, pro: 15, emoji: '🍫' },
    '다크초콜릿': { cal: 60,  pro: 1,   emoji: '🍫' } // 70% 다크초콜릿 한 조각(약 20g) 기준 추정
};

// 실제 사용 중 참조되는 프리셋 값 (처음엔 기본 추정값, refreshFoodHistory() 이후 실제 이력 있으면 그 값으로 대체됨)
let FOOD_PRESETS = JSON.parse(JSON.stringify(FOOD_PRESET_DEFAULTS));

// 동일 프리셋 이름 자기 자신 매핑 (프리셋들은 항상 확정 값으로 인식)
const FOOD_ALIASES = Object.fromEntries(Object.keys(FOOD_PRESET_DEFAULTS).map(name => [name, name]));

// 실제로 다른 날짜에 2번 이상 입력했던 음식들의 통계 (정규화된 텍스트 -> {label, dates:Set, cals:[], pros:[]})
// refreshFoodHistory()가 Firestore 전체 기록을 훑어서 채움
let foodHistory = {};

function normalizeFoodText(text) {
    return (text || '').trim().replace(/\s+/g, '').toLowerCase();
}

// 메모/이름에서 "🥣 그릭요거트 (110kcal · 10g)" 형태의 자동 태그를 분리해 원문과 칼로리를 뽑아냄
function parseFoodEntry(rawText) {
    let text = (rawText || '').trim();
    if (!text) return null;
    let cal = null, pro = null;
    const tagMatch = text.match(/\(([\d.]+)kcal\s*·\s*([\d.]+)g\)\s*$/);
    if (tagMatch) { cal = parseFloat(tagMatch[1]); pro = parseFloat(tagMatch[2]); text = text.slice(0, tagMatch.index).trim(); }
    // 맨 앞의 이모지류(한글/영문/숫자가 아닌 문자) 제거
    text = text.replace(/^[^가-힣a-zA-Z0-9]+/, '').trim();
    if (!text) return null;
    return { label: text, cal, pro };
}

function registerFoodOccurrence(freq, rawText, dateId, mealCal, mealPro) {
    const parsed = parseFoodEntry(rawText);
    if (!parsed) return;
    const key = normalizeFoodText(parsed.label);
    if (!key) return;
    if (!freq[key]) freq[key] = { label: parsed.label, dates: new Set(), cals: [], pros: [] };
    freq[key].dates.add(dateId);
    const cal = (typeof mealCal === 'number' && mealCal > 0) ? mealCal : parsed.cal;
    const pro = (typeof mealPro === 'number' && mealPro > 0) ? mealPro : parsed.pro;
    if (cal != null) freq[key].cals.push(cal);
    if (pro != null) freq[key].pros.push(pro);
}

// Firestore의 caldata 전체를 훑어서 '다른 날짜에 2번 이상 등장한 음식' 통계를 만듦
async function refreshFoodHistory() {
    try {
        const snapshot = await getDocs(collection(db, 'caldata'));
        const freq = {};
        snapshot.forEach(docSnap => {
            const d = docSnap.data();
            if (!d || !Array.isArray(d.meals)) return;
            d.meals.forEach(meal => {
                if (!meal.fixed) registerFoodOccurrence(freq, meal.name, docSnap.id, meal.cal, meal.pro);
                if (Array.isArray(meal.notes)) meal.notes.forEach(note => registerFoodOccurrence(freq, note, docSnap.id));
            });
        });
        foodHistory = freq;
        applyHistoryToPresets();
        renderQuickAddFoods();
    } catch (e) {
        console.error('음식 이력 로드 실패', e);
    }
}

// 프리셋으로 등록해둔 이름을 실제로 입력했던 적이 있으면(1회 이상) 그 평균 칼로리/단백질로 프리셋 값을 갱신
function applyHistoryToPresets() {
    Object.keys(FOOD_PRESET_DEFAULTS).forEach(name => {
        const hist = foodHistory[normalizeFoodText(name)];
        if (hist && hist.cals.length > 0) {
            const avgCal = Math.round(hist.cals.reduce((a, b) => a + b, 0) / hist.cals.length);
            const avgPro = hist.pros.length ? Math.round((hist.pros.reduce((a, b) => a + b, 0) / hist.pros.length) * 10) / 10 : FOOD_PRESET_DEFAULTS[name].pro;
            FOOD_PRESETS[name] = { cal: avgCal, pro: avgPro, emoji: FOOD_PRESET_DEFAULTS[name].emoji };
        } else {
            FOOD_PRESETS[name] = { ...FOOD_PRESET_DEFAULTS[name] };
        }
    });
}

// 프리셋(확정값) 또는 실제 2회 이상 입력 이력(평균값)에서 칼로리/단백질을 찾음
function lookupFood(text) {
    const norm = normalizeFoodText(text);
    if (!norm) return null;
    for (const [alias, canonical] of Object.entries(FOOD_ALIASES)) {
        if (normalizeFoodText(alias) === norm) {
            const p = FOOD_PRESETS[canonical];
            return { cal: p.cal, pro: p.pro, emoji: p.emoji, label: canonical };
        }
    }
    const hist = foodHistory[norm];
    if (hist && hist.dates.size >= 2 && hist.cals.length > 0) {
        const avgCal = Math.round(hist.cals.reduce((a, b) => a + b, 0) / hist.cals.length);
        const avgPro = hist.pros.length ? Math.round((hist.pros.reduce((a, b) => a + b, 0) / hist.pros.length) * 10) / 10 : 0;
        return { cal: avgCal, pro: avgPro, emoji: '🍽️', label: hist.label };
    }
    return null;
}

function buildDatalistOptions() {
    const seen = new Set();
    const options = [];
    Object.keys(FOOD_PRESETS).forEach(name => { options.push(name); seen.add(normalizeFoodText(name)); });
    Object.values(foodHistory).forEach(item => {
        const key = normalizeFoodText(item.label);
        if (item.dates.size >= 2 && !seen.has(key)) { options.push(item.label); seen.add(key); }
    });
    return options;
}

function renderQuickAddFoods() {
    const el = document.getElementById('quickAddFoods');
    if (el) el.innerHTML = buildFoodChipsHtml();
    const dl = document.getElementById('foodPresetsList');
    if (dl) dl.innerHTML = buildDatalistOptions().map(name => `<option value="${name}">`).join('');
}

function buildFoodChipsHtml() {
    return Object.entries(FOOD_PRESETS).map(([name, f]) =>
        `<button type="button" class="btn" style="background:#f0f0f0;color:#667eea;font-size:12px;padding:6px 12px;border-radius:20px;" onclick="showFoodMealPicker('${name}')">${f.emoji} ${name}</button>`
    ).join('');
}

// 퀵버튼 클릭 시 어떤 끼니에 추가할지 선택하는 UI
window.showFoodMealPicker = (foodName) => {
    const el = document.getElementById('quickAddFoods');
    const preset = FOOD_PRESETS[foodName];
    if (!el || !preset) return;
    let html = `<div style="width:100%;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;align-items:center;">
        <span style="font-size:12px;color:#667eea;font-weight:600;">${preset.emoji} ${foodName} → 어디에 추가할까요?</span>`;
    data.meals.forEach(meal => {
        html += `<button type="button" class="btn" style="background:#667eea;color:white;font-size:12px;padding:6px 12px;border-radius:20px;" onclick="applyQuickAddFood('${foodName}', ${meal.id})">${meal.name}</button>`;
    });
    html += `<button type="button" class="btn" style="background:#f0f0f0;color:#667eea;font-size:12px;padding:6px 12px;border-radius:20px;" onclick="applyQuickAddFood('${foodName}', null)">➕ 새 간식으로</button>`;
    html += `<button type="button" class="btn" style="background:#fff;color:#999;font-size:12px;padding:6px 12px;border-radius:20px;border:1px solid #ddd;" onclick="renderQuickAddFoods()">취소</button>`;
    html += `</div>`;
    el.innerHTML = html;
};

// 선택한 끼니에 프리셋 칼로리/단백질을 더하고 메모에 기록 (mealId가 null이면 새 간식 항목 생성)
window.applyQuickAddFood = (foodName, mealId) => {
    const preset = FOOD_PRESETS[foodName];
    if (!preset) return;
    if (mealId === null) {
        const id = Math.max(0, ...data.meals.map(m => m.id)) + 1;
        data.meals.push({ id, name: `${preset.emoji} ${foodName}`, fixed: false, cal: preset.cal, pro: preset.pro, notes: [] });
    } else {
        const meal = data.meals.find(m => m.id === mealId);
        if (!meal) return;
        meal.notes.push(foodName);
        meal.cal = (parseFloat(meal.cal) || 0) + preset.cal;
        meal.pro = Math.round(((parseFloat(meal.pro) || 0) + preset.pro) * 10) / 10;
    }
    render();
};

// 이름 입력창에 프리셋 또는 2회 이상 실제 입력 이력이 있는 음식을 타이핑했을 때 칼로리/단백질 자동완성 (덮어쓰기)
function tryAutoFillByName(mealId, typedName) {
    const found = lookupFood(typedName);
    if (!found) return false;
    const meal = data.meals.find(m => m.id === mealId);
    if (!meal) return false;
    const calEl = document.getElementById('cal_' + mealId);
    const proEl = document.getElementById('pro_' + mealId);
    if (calEl) calEl.value = found.cal;
    if (proEl) proEl.value = found.pro;
    meal.cal = found.cal; meal.pro = found.pro;
    calc();
    return true;
}
window.tryAutoFillByName = tryAutoFillByName;

function setSyncStatus(msg) {
    const el = document.getElementById('syncStatus');
    if (el) el.textContent = '☁️ ' + msg;
}

async function fetchDateRange(dates) {
    const promises = dates.map(d => getDoc(doc(db, 'caldata', d)));
    const docs = await Promise.all(promises);
    const result = {};
    docs.forEach((snap, i) => {
        result[dates[i]] = snap.exists() ? snap.data() : { exercise: false, meals: [] };
    });
    return result;
}

function makeDateList(start, end) {
    const list = [];
    for (let d = new Date(start); d <= new Date(end); d.setDate(d.getDate() + 1)) {
        list.push(new Date(d).toISOString().split('T')[0]);
    }
    return list;
}

async function migrateFromLocalStorage() {
    const metaSnap = await getDoc(doc(db, 'meta', 'info'));
    if (metaSnap.exists() && metaSnap.data().migrated) return;

    const calKeys = [];
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith('cal_')) calKeys.push(key);
    }

    if (calKeys.length > 0) {
        const batch = writeBatch(db);
        calKeys.forEach(key => {
            try {
                const dateStr = key.replace('cal_', '');
                const dayData = JSON.parse(localStorage.getItem(key));
                if (dayData && typeof dayData === 'object') {
                    batch.set(doc(db, 'caldata', dateStr), dayData);
                }
            } catch(e) {}
        });
        await batch.commit();
    }
    await setDoc(doc(db, 'meta', 'info'), { migrated: true });
}

async function load() {
    const snap = await getDoc(doc(db, 'caldata', currentDate));
    data = snap.exists() ? snap.data() : {
        exercise: false,
        meals: [
            { id: 1, name: '☀️ 아침', fixed: true, cal: '', pro: '', notes: [] },
            { id: 2, name: '🌤️ 점심', fixed: true, cal: '', pro: '', notes: [] },
            { id: 3, name: '🌙 저녁', fixed: true, cal: '', pro: '', notes: [] }
        ]
    };
    document.getElementById('dateInput').value = currentDate;
    render();
}

function render() {
    document.getElementById('exerciseCheck').checked = data.exercise || false;
    let html = '';
    data.meals.forEach((meal, idx) => {
        html += `<div class="meal">
        <div class="meal-header">
            <div class="meal-name"><input type="text" value="${meal.name}" id="name_${meal.id}" ${meal.fixed ? 'readonly' : `list="foodPresetsList" onchange="tryAutoFillByName(${meal.id}, this.value)"`}></div>
            <div class="meal-controls">
            ${!meal.fixed ? `<button class="meal-btn" onclick="moveUp(${idx})">↑</button><button class="meal-btn" onclick="moveDown(${idx})">↓</button><button class="meal-btn" onclick="delMeal(${meal.id})">✕</button>` : ''}
            </div>
        </div>
        <div class="notes">
            ${meal.notes.map((note, nidx) => `<div class="note-item"><div class="note-text">${note}</div><button class="note-del" onclick="editNote(${meal.id},${nidx})">수정</button><button class="note-del" onclick="delNote(${meal.id},${nidx})">✕</button></div>`).join('')}
            <div class="note-input">
                <input type="text" id="noteInput_${meal.id}" placeholder="음식 상세" list="foodPresetsList" onkeypress="if(event.key==='Enter') addNote(${meal.id})">
                <button onclick="addNote(${meal.id})">추가</button>
            </div>
        </div>
        <div class="inputs">
            <div class="input-group"><label class="label">칼로리</label><input type="number" id="cal_${meal.id}" value="${meal.cal || ''}" placeholder="0" oninput="calc()"></div>
            <div class="input-group"><label class="label">단백질(g)</label><input type="number" id="pro_${meal.id}" value="${meal.pro || ''}" placeholder="0" step="0.1" oninput="calc()"></div>
        </div>
        </div>`;
    });
    document.getElementById('meals').innerHTML = html;
    renderQuickAddFoods();
    calc();
}

function calc() {
    if (!data || !data.meals) return;
    let c = 0, p = 0;
    data.meals.forEach(meal => {
        const calEl = document.getElementById('cal_' + meal.id);
        const proEl = document.getElementById('pro_' + meal.id);
        if (calEl) c += parseFloat(calEl.value) || 0;
        if (proEl) p += parseFloat(proEl.value) || 0;
    });
    document.getElementById('totalCal').textContent = Math.round(c);
    document.getElementById('totalPro').textContent = p.toFixed(1);
    const calDiff = Math.round(c - 1800);
    const calDiffEl = document.getElementById('calDiff');
    calDiffEl.className = 'stat-diff ' + (c < 1800 ? 'stat-green' : 'stat-red');
    calDiffEl.textContent = (calDiff >= 0 ? '+' : '') + calDiff;
    const proDiff = Math.round((p - 120) * 10) / 10;
    const proDiffEl = document.getElementById('proDiff');
    proDiffEl.className = 'stat-diff ' + (p < 120 ? 'stat-red' : 'stat-green');
    proDiffEl.textContent = (proDiff >= 0 ? '+' : '') + proDiff;
}

window.addNote = (mealId) => {
    const input = document.getElementById('noteInput_' + mealId);

    if (text) {
        const meal = data.meals.find(m => m.id === mealId);
        if (meal) {
            const found = lookupFood(text);
            if (found) {
                meal.notes.push(text);
                meal.cal = (parseFloat(meal.cal) || 0) + found.cal;
                meal.pro = Math.round(((parseFloat(meal.pro) || 0) + found.pro) * 10) / 10;
            } else {
                meal.notes.push(text);
            }
            input.value = '';
            render();
        }

};

async function renderWeek() {
    const d = new Date(weekRefDate);
    const dow = d.getDay();
    const monday = new Date(new Date(weekRefDate).setDate(d.getDate() - dow + (dow===0?-6:1)));
    const dates = Array.from({length:7}, (_,i) => { const x=new Date(monday); x.setDate(x.getDate()+i); return x.toISOString().split('T')[0]; });
    const mon = new Date(dates[0]); const sun = new Date(dates[6]);
    document.getElementById('weekTitle').innerHTML = `<button onclick="prevWeek()" class="btn" style="background:#f0f0f0;color:#667eea;padding:4px 14px;font-size:16px;">‹</button><span style="font-weight:bold;">${mon.getMonth()+1}/${mon.getDate()} ~ ${sun.getMonth()+1}/${sun.getDate()}</span><button onclick="nextWeek()" class="btn" style="background:#f0f0f0;color:#667eea;padding:4px 14px;font-size:16px;">›</button>`;
    const dayData = await fetchDateRange(dates);
    const days = ['월','화','수','목','금','토','일'];
    let html = ''; const calData=[], proData=[], labels=[];
    dates.forEach((dateStr, i) => {
        const s = dayData[dateStr]; let c=0,p=0;
        if (s.meals) s.meals.forEach(m => { c+=m.cal||0; p+=m.pro||0; });
        const dObj = new Date(dateStr);
        const dayName = days[dObj.getDay()===0?6:dObj.getDay()-1];
        labels.push(`${dObj.getMonth()+1}/${dObj.getDate()} ${dayName}${s.exercise ? ' 🏋🏻‍♀️' : ''}`);
        calData.push(c); proData.push(p);
        html += `<tr><td>${dayName} ${s.exercise?'🏋🏻‍♀️':''}</td><td>${Math.round(c)}</td><td>${p.toFixed(1)}</td></tr>`;
    });
    const avgCal = calData.reduce((a,b)=>a+b,0) / calData.length;
    const avgPro = proData.reduce((a,b)=>a+b,0) / proData.length;
    const calDiff = Math.round(avgCal - 1800);
    const proDiff = Math.round((avgPro - 120) * 10) / 10;
    const calDiffColor = calDiff <= 0 ? '#4ade80' : '#ef4444';
    const proDiffColor = proDiff < 0 ? '#ef4444' : '#4ade80';
    const calDiffStr = (calDiff >= 0 ? '+' : '') + calDiff;

    html += `<tr style="background:#f7f8fc;font-weight:700;border-top:2px solid #667eea;"><td>평균</td><td style="color:#f87171;">${Math.round(avgCal)} <span style="font-size:10px;color:${calDiffColor};">(${calDiffStr})</span></td><td style="color:#60a5fa;">${avgPro.toFixed(1)} <span style="font-size:10px;color:${proDiffColor};">(${proDiffStr})</span></td></tr>`;
    document.getElementById('weeklyTable').innerHTML = html;
    // 입력값에 따라 y축 최댓값 자동 조정 (목표선 + 여유 10%)
    const calMax = Math.max(2200, Math.ceil(Math.max(...calData, 1800) * 1.1 / 100) * 100);
    const proMax = Math.max(180, Math.ceil(Math.max(...proData, 120) * 1.1 / 10) * 10);

    Chart.register(ChartDataLabels);

            {data:calData,borderColor:'#f87171',borderWidth:2,fill:false,pointRadius:4,pointBackgroundColor:'#f87171',pointBorderColor:'#fff',pointBorderWidth:2,yAxisID:'y',tension:0.4,datalabels:{color:'#f87171',display:true,font:{weight:'bold',size:10}}},
            {data:proData,borderColor:'#60a5fa',borderWidth:2,fill:false,pointRadius:4,pointBackgroundColor:'#60a5fa',pointBorderColor:'#fff',pointBorderWidth:2,yAxisID:'y1',tension:0.4,datalabels:{color:'#60a5fa',display:true,font:{weight:'bold',size:10}}},
            {data:[1800,1800,1800,1800,1800,1800,1800],borderColor:'#f87171',borderDash:[8,4],borderWidth:2,fill:false,pointRadius:0,yAxisID:'y',datalabels:{display:false}},
            {data:[120,120,120,120,120,120,120],borderColor:'#60a5fa',borderDash:[8,4],borderWidth:2,fill:false,pointRadius:0,yAxisID:'y1',datalabels:{display:false}}

async function loadMonthlyCalendar() {
    const year = calYear;
    const month = calMonth;
    const lastDay = new Date(year, month+1, 0).getDate();
    const firstDow = new Date(year, month, 1).getDay();
    const dates = makeDateList(
        `${year}-${String(month+1).padStart(2,'0')}-01`,
        `${year}-${String(month+1).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`
    );
    const dayData = await fetchDateRange(dates);
    let html = `<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:15px;">
        <button onclick="prevMonth()" class="btn" style="background:#f0f0f0;color:#667eea;padding:4px 14px;font-size:16px;">‹</button>
        <span style="font-weight:bold;">${year}년 ${month+1}월</span>
        <button onclick="nextMonth()" class="btn" style="background:#f0f0f0;color:#667eea;padding:4px 14px;font-size:16px;">›</button>
    </div>`;
    html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;">';
    ['일','월','화','수','목','금','토'].forEach(d => { html += `<div style="text-align:center;font-weight:600;font-size:12px;padding:8px;">${d}</div>`; });
    for (let i=0;i<firstDow;i++) html += '<div style="min-height:80px;"></div>';
    for (let day=1;day<=lastDay;day++) {
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const s = dayData[dateStr]||{meals:[]}; let c=0,p=0;
        if (s.meals) s.meals.forEach(m=>{c+=m.cal||0;p+=m.pro||0;});
        const exBg = s.exercise ? 'background:rgba(102,126,234,0.09);border:1px solid rgba(102,126,234,0.25);' : 'border:1px solid #e0e0e0;';
        html += `<div style="${exBg}border-radius:8px;padding:8px;min-height:80px;font-size:11px;">
            <div style="font-weight:600;margin-bottom:4px;">${day}${s.exercise ? ' <span style="font-size:10px;">🏋🏻‍♀️</span>' : ''}</div>
            <div style="color:#f87171;font-weight:600;">${c>0?Math.round(c):''}</div>
            <div style="color:#60a5fa;font-weight:600;">${p>0?p.toFixed(1)+'g':''}</div>
        </div>`;
    }
    html += '</div>';
    document.getElementById('monthlyCalendar').innerHTML = html;
}

    const proMax = Math.max(180, Math.ceil(Math.max(...proData, 120) * 1.1 / 10) * 10);
    const ctx = document.getElementById('monthlyGraphChart').getContext('2d');
    if (window.monthlyGraphInstance) window.monthlyGraphInstance.destroy();
    Chart.register(ChartDataLabels);
    window.monthlyGraphInstance = new Chart(ctx, {
        type:'line', data:{ labels, datasets:[
            {data:calData,borderColor:'#f87171',borderWidth:2,fill:false,pointRadius:3,pointBackgroundColor:'#f87171',yAxisID:'y',tension:0.4,datalabels:{color:'#f87171',display:showLabels,font:{weight:'bold',size:9}}},
            {data:proData,borderColor:'#60a5fa',borderWidth:2,fill:false,pointRadius:3,pointBackgroundColor:'#60a5fa',yAxisID:'y1',tension:0.4,datalabels:{color:'#60a5fa',display:showLabels,font:{weight:'bold',size:9}}},
            {data:Array(calData.length).fill(1800),borderColor:'#f87171',borderDash:[8,4],borderWidth:1.5,fill:false,pointRadius:0,yAxisID:'y',datalabels:{display:false}},
            {data:Array(proData.length).fill(120),borderColor:'#60a5fa',borderDash:[8,4],borderWidth:1.5,fill:false,pointRadius:0,yAxisID:'y1',datalabels:{display:false}}
        ]},
        options:{ responsive:true, plugins:{legend:{display:false}},
            scales:{ x:{ticks:{font:{size:10}}}, y:{type:'linear',position:'left',ticks:{callback:()=>''},min:0,max:calMax}, y1:{type:'linear',position:'right',ticks:{callback:()=>''},grid:{drawOnChartArea:false},min:0,max:proMax} } }
    });
};

// 초기화
async function init() {
    // 미리보기/제한된 네트워크에서 Firebase 연결이 지연돼도 화면은 뜨도록 안전장치 (4초)
    const safety = setTimeout(() => {
        if (!data.meals) {
            data = { exercise: false, meals: [
                { id: 1, name: '☀️ 아침', fixed: true, cal: '', pro: '', notes: [] },
                { id: 2, name: '🌤️ 점심', fixed: true, cal: '', pro: '', notes: [] },
                { id: 3, name: '🌙 저녁', fixed: true, cal: '', pro: '', notes: [] }
            ]};
            document.getElementById('dateInput').value = currentDate;
            render();
        }
        document.getElementById('loadingOverlay').style.display = 'none';
        setSyncStatus('오프라인 (미리보기)');
    }, 4000);
    try {
        await migrateFromLocalStorage();
        await load();
        clearTimeout(safety);
    } catch(e) {
        console.error(e);
        setSyncStatus('연결 오류 ❌');
    } finally {
        clearTimeout(safety);
        document.getElementById('loadingOverlay').style.display = 'none';
        checkBackupReminder();
        refreshFoodHistory(); // 실제 입력 이력 기반 자동완성 목록 준비 (막혀도 무시하고 진행)
    }
}
init();
</script>
